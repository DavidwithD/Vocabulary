<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Vocabulary Builder</h1>

    <div class="settings-row">
      <label for="highlightToggle">Highlight</label>
      <label class="switch">
        <input type="checkbox" id="highlightToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="settings-row">
      <label for="threshold">Common words:</label>
      <select id="threshold">
        <option value="1000">1,000</option>
        <option value="2000">2,000</option>
        <option value="3000">3,000</option>
        <option value="5000">5,000</option>
        <option value="7000">7,000</option>
        <option value="10000">10,000</option>
      </select>
    </div>

    <div id="pageStats" class="page-stats"></div>

    <div class="tabs">
      <button class="tab active" data-tab="learning">Learning <span id="learningCount">0</span></button>
      <button class="tab" data-tab="familiar">Familiar <span id="familiarCount">0</span></button>
    </div>

    <div class="list-toolbar">
      <div id="wordCount" class="word-count">0 words total</div>
      <div id="listActions" class="list-actions">
        <button id="copyBtn" class="action-btn" title="Copy to clipboard">&#x2750;</button>
        <button id="downloadBtn" class="action-btn" title="Download as text file">&#x2B07; </button>
      </div>
    </div>

    <ul id="learningList" class="word-section"></ul>
    <ul id="familiarList" class="word-section" style="display: none;"></ul>

    <div id="emptyState" class="empty-state">
      No words yet. Start adding some!
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
